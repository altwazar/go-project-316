# .golangci.yml для версии 2.x
version: "2"

linters:
  default: none
  enable:
    - cyclop
    - gocyclo
    - revive
    - staticcheck
    - gosec
    - govet
    - dupl
    - goconst
    - gocritic

  settings:
    cyclop:
      max-complexity: 10
      package-average: 5.0
    gocyclo:
      min-complexity: 5

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
